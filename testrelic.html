<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>🎮 زر الرجوع الثابت | Relic Runway</title>
    <!-- Bootstrap 5 RTL + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Cairo', sans-serif; }
        body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; min-width: 100dvw; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
        .game-master-container { position: relative; width: 100%; height: 100%; max-width: 100vw; max-height: 100vh; background: #0b0e14; overflow: hidden; }
        .iframe-full-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #0a0c12; }
        #gameFrame { width: 100%; height: 100%; border: none; display: block; background: #0f1219; }

        /* Pre‑Splash */
        .pre-splash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000;
            background: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .pre-splash img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            user-select: none;
        }
        .pre-splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* الشاشة الرئيسية */
        .fullscreen-splash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000;
            cursor: pointer;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
            will-change: opacity;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .splash-image { width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block; pointer-events: none; user-select: none; -webkit-user-drag: none; }
        @media (min-aspect-ratio: 21/9) { .splash-image { object-fit: contain; background: #000; } }
        .fullscreen-splash.splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* أيقونة الصوت */
        .sound-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1002;
            width: 48px;
            height: 48px;
            background: rgba(20, 25, 35, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1.5px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.25s ease;
            color: white;
            font-size: 24px;
        }
        .sound-icon:hover { background: rgba(40, 45, 60, 0.85); border-color: gold; transform: scale(1.05); }
        .sound-icon:active { transform: scale(0.95); }
        .sound-icon.hidden { opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.3s, visibility 0.3s; }
        .sound-icon::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, 0.4);
            animation: pulseRing 2s infinite;
            pointer-events: none;
        }
        @keyframes pulseRing {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.4); }
        }

        /* زر الرجوع الثابت (فوق iframe، لا يختفي أبدًا) */
        .back-button {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1003; /* أعلى من iframe */
            width: 56px;
            height: 56px;
            background: rgba(20, 25, 35, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.8);
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            transition: all 0.25s ease;
            color: white;
            font-size: 28px;
            pointer-events: auto; /* مضمون */
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }
        .back-button:hover { background: rgba(255, 215, 0, 0.9); color: #0b0e14; border-color: white; }
        .back-button:active { transform: scale(0.95); }

        .preload-hint {
            position: absolute; bottom: 100px; left: 0; right: 0; text-align: center;
            color: rgba(255,255,255,0.5); font-size: 0.9rem; z-index: 5; pointer-events: none;
            backdrop-filter: blur(4px); width: fit-content; margin: 0 auto; padding: 6px 18px;
            border-radius: 40px; background: rgba(10,15,20,0.2); border: 1px solid rgba(255,215,0,0.15);
            transition: opacity 0.5s;
        }

        @media (max-width: 600px) {
            .sound-icon { width: 42px; height: 42px; font-size: 22px; top: 16px; left: 16px; }
            .back-button { width: 48px; height: 48px; font-size: 24px; bottom: 20px; right: 16px; }
        }
    </style>
</head>
<body>
    <div class="game-master-container" id="masterContainer">
        <div class="iframe-full-wrapper">
            <!-- iframe اللعبة بدون أي sandbox -->
            <iframe id="gameFrame" 
                src="https://gemioli.com/relicrunway/" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen">
            </iframe>
            <div class="preload-hint" id="loadingHint">⏳ جاري تحميل المغامرة...</div>
        </div>

        <!-- زر الرجوع (يظهر فور إخفاء الـ Splash، ولا يختفي أبدًا) -->
        <div class="back-button" id="backButton" title="العودة إلى اللعبة">
            <i class="bi bi-arrow-left"></i>
        </div>

        <!-- الشاشة الرئيسية (Splash) -->
        <div class="fullscreen-splash" id="splashScreen">
            <img src="https://turkify.netlify.app/20260407_221107.webp" alt="Splash Screen" class="splash-image" loading="eager" fetchpriority="high" decoding="async" draggable="false">
            <div class="sound-icon hidden" id="soundIcon">🎵</div>
        </div>

        <!-- Pre‑Splash -->
        <div class="pre-splash" id="preSplash">
            <img src="https://turkify.netlify.app/lucyhuntstartgame.gif" alt="Start Game" loading="eager" fetchpriority="high" decoding="async" draggable="false">
        </div>
    </div>

    <script>
        (function(){
            "use strict";

            // رابط الموسيقى
            const AUDIO_URL = 'https://raw.githubusercontent.com/turkifyy/t1315fy/refs/heads/main/lucy_s_hunt.mp3';
            const GAME_URL = 'https://gemioli.com/relicrunway/';
            
            const master = document.getElementById('masterContainer');
            const preSplash = document.getElementById('preSplash');
            const splash = document.getElementById('splashScreen');
            const frame = document.getElementById('gameFrame');
            const hint = document.getElementById('loadingHint');
            const soundIcon = document.getElementById('soundIcon');
            const backButton = document.getElementById('backButton');

            // نظام الصوت
            let audioContext = null, sourceNode = null, gainNode = null, audioBuffer = null;
            let isMusicPlaying = false, isAudible = false;
            let stopTimer = null, preSplashHandled = false;

            // زر الرجوع يكون مخفيًا فقط خلف الـ Splash، لذا نعرضه عند إخفاء الـ Splash
            // لكن لجعله ثابتًا دائمًا بعد ذلك، نضبط CSS ليظهر دائمًا (تم إزالة كلاس show و hide)
            // في CSS جعلنا back-button مرئيًا افتراضيًا، ولكننا نريد إخفاءه فقط أثناء عرض الـ Splash
            // لذلك سنضبطه مخفيًا في البداية ثم نظهره بعد إخفاء الـ Splash
            backButton.style.opacity = '0';
            backButton.style.visibility = 'hidden';
            backButton.style.pointerEvents = 'none';

            // ---------- اعتراض النوافذ المنبثقة وإغلاقها + إعادة iframe للعبة ----------
            const originalWindowOpen = window.open;
            window.open = function(url, target, features) {
                if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
                    console.log('🔔 اعتراض نافذة منبثقة، إعادة iframe للعبة.');
                    resetToGame();
                    
                    const newWin = originalWindowOpen.call(window, url, target, features);
                    if (newWin) {
                        setTimeout(() => { try { newWin.close(); } catch(e) {} }, 10);
                    }
                    return null;
                }
                return originalWindowOpen.call(window, url, target, features);
            };

            // اعتراض الروابط ذات target="_blank"
            document.addEventListener('click', (e) => {
                const link = e.target.closest('a');
                if (link && link.href && (link.target === '_blank' || link.getAttribute('target') === '_blank')) {
                    const url = link.href;
                    if (url.startsWith('http://') || url.startsWith('https://')) {
                        e.preventDefault();
                        resetToGame();
                        const newWin = window.open(url, '_blank');
                        if (newWin) {
                            setTimeout(() => { try { newWin.close(); } catch(e) {} }, 10);
                        }
                    }
                }
            }, true);

            // وظيفة إعادة iframe إلى رابط اللعبة الأصلي
            function resetToGame() {
                frame.src = GAME_URL;
                console.log('🔄 تم إعادة iframe إلى رابط اللعبة.');
            }

            // زر الرجوع: يعيد iframe إلى اللعبة
            backButton.addEventListener('click', (e) => {
                e.stopPropagation();
                resetToGame();
            });

            // منع iframe من استقبال النقرات في منطقة الزر
            backButton.addEventListener('mousedown', (e) => e.stopPropagation());
            backButton.addEventListener('touchstart', (e) => e.stopPropagation());

            // ---------- الموسيقى ----------
            async function startAudibleMusic() {
                if (isMusicPlaying) return true;
                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    audioContext = new AudioContextClass();
                    const response = await fetch(AUDIO_URL);
                    const arrayBuffer = await response.arrayBuffer();
                    audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    gainNode = audioContext.createGain();
                    gainNode.gain.value = 0.5;
                    sourceNode = audioContext.createBufferSource();
                    sourceNode.buffer = audioBuffer;
                    sourceNode.loop = true;
                    sourceNode.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    sourceNode.start(0);
                    isMusicPlaying = true; isAudible = true;
                    soundIcon.classList.add('hidden');
                    return true;
                } catch (error) {
                    try {
                        const audio = new Audio(AUDIO_URL);
                        audio.crossOrigin = 'anonymous'; audio.loop = true; audio.volume = 0.5;
                        await audio.play();
                        window._fallbackAudio = audio;
                        isMusicPlaying = true; isAudible = true;
                        soundIcon.classList.add('hidden');
                        return true;
                    } catch (e) {
                        soundIcon.classList.remove('hidden');
                        return false;
                    }
                }
            }

            soundIcon.addEventListener('click', async (e) => {
                e.stopPropagation();
                if (isAudible) { soundIcon.classList.add('hidden'); return; }
                await startAudibleMusic();
            });

            async function handlePreSplashClick() {
                if (preSplashHandled) return;
                preSplashHandled = true;
                await startAudibleMusic();
                preSplash.classList.add('hidden');
            }

            preSplash.addEventListener('click', handlePreSplashClick);
            preSplash.addEventListener('touchend', (e) => { e.preventDefault(); handlePreSplashClick(); }, { passive: false });
            preSplash.addEventListener('contextmenu', (e) => e.preventDefault());
            preSplash.addEventListener('dragstart', (e) => e.preventDefault());

            let splashHidden = false;
            function hideMainSplash() {
                if (splashHidden) return;
                splash.classList.add('splash-hidden');
                master.classList.add('splash-hidden');
                if (hint) { hint.style.opacity = '0'; setTimeout(() => { if(hint) hint.style.display = 'none'; }, 400); }
                splashHidden = true;
                
                // إظهار زر الرجوع (سيظل ظاهرًا دائمًا بعد ذلك)
                backButton.style.opacity = '1';
                backButton.style.visibility = 'visible';
                backButton.style.pointerEvents = 'auto';
                
                if (stopTimer) clearTimeout(stopTimer);
                stopTimer = setTimeout(() => { fadeOutAndStopMusic(); stopTimer = null; }, 35000);
            }

            function fadeOutAndStopMusic() {
                if (!isMusicPlaying) return;
                const fadeDuration = 1.5;
                if (gainNode) {
                    gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + fadeDuration);
                    setTimeout(() => stopMusicImmediately(), fadeDuration * 1000);
                } else if (window._fallbackAudio) {
                    const audio = window._fallbackAudio;
                    const step = 0.05; const interval = 50;
                    const fadeInterval = setInterval(() => {
                        if (audio.volume > step) audio.volume = Math.max(0, audio.volume - step);
                        else { audio.volume = 0; clearInterval(fadeInterval); stopMusicImmediately(); }
                    }, interval);
                }
            }

            function stopMusicImmediately() {
                if (sourceNode) { try { sourceNode.stop(); } catch(e) {} sourceNode = null; }
                if (audioContext) { audioContext.close(); audioContext = null; }
                if (window._fallbackAudio) { window._fallbackAudio.pause(); window._fallbackAudio = null; }
                isMusicPlaying = false; isAudible = false;
            }

            splash.addEventListener('click', (e) => { if (e.target === soundIcon || soundIcon.contains(e.target)) return; hideMainSplash(); });
            splash.addEventListener('touchend', (e) => { if (e.target === soundIcon || soundIcon.contains(e.target)) return; e.preventDefault(); hideMainSplash(); }, { passive: false });
            splash.addEventListener('contextmenu', (e) => e.preventDefault());
            splash.addEventListener('dragstart', (e) => e.preventDefault());

            // تحميل iframe
            let frameLoaded = false, loadTimeout = null;
            frame.addEventListener('load', () => {
                frameLoaded = true;
                if (hint) { hint.textContent = '✨ جاهز! اضغط للبدء'; hint.style.opacity = '0.8'; }
                if (loadTimeout) clearTimeout(loadTimeout);
            });
            frame.addEventListener('error', () => { if (hint) hint.textContent = '⚡ جارٍ المحاولة...'; });
            loadTimeout = setTimeout(() => { if (!frameLoaded && hint) { hint.textContent = '🎯 اضغط للمتابعة'; hint.style.opacity = '0.7'; } }, 6000);

            function adjustImage() {
                const img = document.querySelector('.splash-image');
                if (!img) return;
                const ratio = window.innerWidth / window.innerHeight;
                img.style.objectFit = (ratio >= 2.2) ? 'contain' : 'cover';
                img.style.background = (ratio >= 2.2) ? '#000' : 'transparent';
            }
            function setViewportHeight() { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); }
            window.addEventListener('resize', () => { adjustImage(); setViewportHeight(); });
            window.addEventListener('orientationchange', () => setTimeout(() => { adjustImage(); setViewportHeight(); }, 50));
            adjustImage(); setViewportHeight();

            window.addEventListener('beforeunload', () => {
                if (loadTimeout) clearTimeout(loadTimeout);
                if (stopTimer) clearTimeout(stopTimer);
                stopMusicImmediately();
            });

            console.log('🚀 زر الرجوع ثابت ولا يختفي مهما حدث داخل iframe.');
        })();
    </script>
</body>
</html>
