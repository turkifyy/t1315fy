<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>🎮 Splash + موسيقى ذكية | Relic Runway</title>
    <!-- Bootstrap 5 RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Cairo', sans-serif; }
        body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; min-width: 100dvw; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
        .game-master-container { position: relative; width: 100%; height: 100%; max-width: 100vw; max-height: 100vh; background: #0b0e14; overflow: hidden; }
        .iframe-full-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #0a0c12; pointer-events: none; }
        .game-master-container.splash-hidden .iframe-full-wrapper { pointer-events: auto; }
        #gameFrame { width: 100%; height: 100%; border: none; display: block; background: #0f1219; }
        .fullscreen-splash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; cursor: pointer; background: #000; display: flex; align-items: center; justify-content: center; transition: opacity 0.45s, visibility 0.45s; will-change: opacity; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
        .splash-image { width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block; pointer-events: none; user-select: none; -webkit-user-drag: none; }
        @media (min-aspect-ratio: 21/9) { .splash-image { object-fit: contain; background: #000; } }
        .fullscreen-splash.splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* زر الصوت */
        .sound-control-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            background: rgba(20, 25, 35, 0.85);
            backdrop-filter: blur(8px);
            color: white;
            border: 1.5px solid rgba(255, 215, 0, 0.5);
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
            border: none;
            outline: none;
            white-space: nowrap;
        }
        .sound-control-btn:hover { background: rgba(40, 45, 60, 0.9); border-color: gold; transform: translateX(-50%) scale(1.02); }
        .sound-control-btn:active { transform: translateX(-50%) scale(0.98); }
        .sound-control-btn.hidden { opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.3s, visibility 0.3s; }
        @media (max-width: 480px) { .sound-control-btn { padding: 10px 20px; font-size: 1rem; bottom: 20px; } }

        .preload-hint {
            position: absolute; bottom: 100px; left: 0; right: 0; text-align: center;
            color: rgba(255,255,255,0.5); font-size: 0.9rem; z-index: 5; pointer-events: none;
            backdrop-filter: blur(4px); width: fit-content; margin: 0 auto; padding: 6px 18px;
            border-radius: 40px; background: rgba(10,15,20,0.2); border: 1px solid rgba(255,215,0,0.15);
            transition: opacity 0.5s;
        }
        @media (min-width: 1920px) { .preload-hint { font-size: 1.4rem; padding: 12px 32px; } }
    </style>
</head>
<body>
    <div class="game-master-container" id="masterContainer">
        <div class="iframe-full-wrapper">
            <iframe id="gameFrame" title="Relic Runway Game" src="https://gemioli.com/relicrunway/" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" loading="eager" importance="high"></iframe>
            <div class="preload-hint" id="loadingHint">⏳ جاري تحميل المغامرة...</div>
        </div>
        <div class="fullscreen-splash" id="splashScreen">
            <img src="https://turkify.netlify.app/20260407_221107.webp" alt="Splash Screen" class="splash-image" loading="eager" fetchpriority="high" decoding="async" draggable="false">
            <button class="sound-control-btn" id="soundButton"><span>🔇</span> <span>تشغيل الصوت</span></button>
        </div>
    </div>

    <script>
        (function(){
            "use strict";

            // ---------- الرابط المحول (dl=1) مع إمكانية إضافة معامل raw احتياطي ----------
            const AUDIO_URL = 'https://www.dropbox.com/scl/fi/df0c05o2z5bxt2ofetk5a/lucy_s_hunt.mp3?rlkey=gt7jw8086tpqdn03mz8l1mms7&dl=1';
            
            const master = document.getElementById('masterContainer');
            const splash = document.getElementById('splashScreen');
            const frame = document.getElementById('gameFrame');
            const hint = document.getElementById('loadingHint');
            const soundBtn = document.getElementById('soundButton');

            let webAudio = { context: null, source: null, gainNode: null };
            let fallbackAudio = null;
            let musicActive = false;
            let musicAudible = false;

            // ---------- محاولة تشغيل صامت عبر Web Audio مع CORS ----------
            async function trySilentWebAudio() {
                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    webAudio.context = new AudioContextClass();
                    
                    // استخدام fetch مع crossorigin
                    const response = await fetch(AUDIO_URL, { 
                        mode: 'cors',
                        credentials: 'omit',
                        cache: 'default'
                    });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await webAudio.context.decodeAudioData(arrayBuffer);
                    
                    const gainNode = webAudio.context.createGain();
                    gainNode.gain.value = 0; // صامت
                    webAudio.gainNode = gainNode;
                    
                    webAudio.source = webAudio.context.createBufferSource();
                    webAudio.source.buffer = audioBuffer;
                    webAudio.source.loop = true;
                    webAudio.source.connect(gainNode);
                    gainNode.connect(webAudio.context.destination);
                    webAudio.source.start(0);
                    
                    musicActive = true;
                    musicAudible = false;
                    console.log('🔇 Web Audio صامت يعمل.');
                    return true;
                } catch (e) {
                    console.warn('Web Audio فشل:', e.message);
                    return false;
                }
            }

            // ---------- محاولة تشغيل صامت عبر Audio element ----------
            function trySilentAudioElement() {
                return new Promise((resolve) => {
                    const audio = new Audio();
                    audio.crossOrigin = 'anonymous';  // مهم لـ CORS
                    audio.src = AUDIO_URL;
                    audio.loop = true;
                    audio.volume = 0.0;
                    
                    audio.play().then(() => {
                        fallbackAudio = audio;
                        musicActive = true;
                        musicAudible = false;
                        console.log('🔇 Audio element صامت يعمل.');
                        resolve(true);
                    }).catch((err) => {
                        console.warn('Audio element فشل:', err);
                        resolve(false);
                    });
                });
            }

            // ---------- رفع الصوت ليكون مسموعاً ----------
            function makeAudible() {
                if (!musicActive) return;
                if (webAudio.source && webAudio.gainNode) {
                    webAudio.gainNode.gain.linearRampToValueAtTime(0.5, webAudio.context.currentTime + 0.1);
                    musicAudible = true;
                    console.log('🔊 Web Audio أصبح مسموعاً.');
                } else if (fallbackAudio) {
                    fallbackAudio.volume = 0.5;
                    musicAudible = true;
                    console.log('🔊 Audio element أصبح مسموعاً.');
                }
            }

            // ---------- بدء التشغيل المسموع من البداية (عند فشل الصامت) ----------
            async function startAudibleFromScratch() {
                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    webAudio.context = new AudioContextClass();
                    const response = await fetch(AUDIO_URL);
                    const arrayBuffer = await response.arrayBuffer();
                    const buffer = await webAudio.context.decodeAudioData(arrayBuffer);
                    
                    webAudio.source = webAudio.context.createBufferSource();
                    webAudio.source.buffer = buffer;
                    webAudio.source.loop = true;
                    const gainNode = webAudio.context.createGain();
                    gainNode.gain.value = 0.5;
                    webAudio.source.connect(gainNode);
                    gainNode.connect(webAudio.context.destination);
                    webAudio.source.start(0);
                    webAudio.gainNode = gainNode;
                    musicActive = true;
                    musicAudible = true;
                    console.log('🎵 بدأ التشغيل المسموع (Web Audio).');
                } catch (e) {
                    const audio = new Audio(AUDIO_URL);
                    audio.crossOrigin = 'anonymous';
                    audio.loop = true;
                    audio.volume = 0.5;
                    await audio.play();
                    fallbackAudio = audio;
                    musicActive = true;
                    musicAudible = true;
                    console.log('🎵 بدأ التشغيل المسموع (Audio element).');
                }
            }

            // ---------- إخفاء الزر ----------
            function hideSoundButton() {
                soundBtn.classList.add('hidden');
            }

            // ---------- إيقاف الموسيقى ----------
            function stopAllAudio() {
                if (webAudio.source) { try { webAudio.source.stop(); } catch(e) {} webAudio.source = null; }
                if (webAudio.context) { webAudio.context.close(); webAudio.context = null; }
                if (fallbackAudio) { fallbackAudio.pause(); fallbackAudio = null; }
                musicActive = false; musicAudible = false;
                console.log('⏹️ الموسيقى توقفت.');
            }

            // ---------- النقر على الزر ----------
            async function onSoundButtonClick(e) {
                e.stopPropagation();
                if (musicAudible) { hideSoundButton(); return; }
                if (!musicActive) {
                    await startAudibleFromScratch();
                } else {
                    makeAudible();
                }
                hideSoundButton();
            }

            // ---------- إخفاء السبلاش ----------
            let splashHidden = false;
            function hideSplash() {
                if (splashHidden) return;
                stopAllAudio();
                splash.classList.add('splash-hidden');
                master.classList.add('splash-hidden');
                if (hint) { hint.style.opacity = '0'; setTimeout(() => { if(hint) hint.style.display = 'none'; }, 400); }
                splashHidden = true;
            }

            // ---------- ربط الأحداث ----------
            soundBtn.addEventListener('click', onSoundButtonClick);
            splash.addEventListener('click', (e) => {
                if (e.target === soundBtn || soundBtn.contains(e.target)) return;
                hideSplash();
            });
            splash.addEventListener('touchend', (e) => {
                if (e.target === soundBtn || soundBtn.contains(e.target)) return;
                e.preventDefault();
                hideSplash();
            }, { passive: false });
            splash.addEventListener('contextmenu', (e) => e.preventDefault());
            splash.addEventListener('dragstart', (e) => e.preventDefault());

            // ---------- بدء التشغيل التلقائي الصامت ----------
            async function initAutoPlay() {
                const webSuccess = await trySilentWebAudio();
                if (!webSuccess) await trySilentAudioElement();

                if (musicActive) {
                    hideSoundButton();
                    console.log('✅ تشغيل صامت تلقائي ناجح، الزر مخفي.');
                    // إلغاء الكتم عند أول لمسة حقيقية
                    const unmuteOnce = () => {
                        if (musicActive && !musicAudible) makeAudible();
                        document.removeEventListener('touchstart', unmuteOnce);
                        document.removeEventListener('click', unmuteOnce);
                    };
                    document.addEventListener('touchstart', unmuteOnce, { once: true });
                    document.addEventListener('click', unmuteOnce, { once: true });
                } else {
                    console.log('⚠️ التشغيل التلقائي فشل، الزر ظاهر. محاولة محاكاة النقر...');
                    // محاكاة نقر تلقائي بعد 200ms
                    setTimeout(() => soundBtn.click(), 200);
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initAutoPlay);
            } else {
                initAutoPlay();
            }
            setTimeout(initAutoPlay, 50);

            // ---------- تحميل iframe ----------
            let frameLoaded = false, loadTimeout = null;
            frame.addEventListener('load', () => {
                frameLoaded = true;
                if (hint) { hint.textContent = '✨ جاهز! اضغط للبدء'; hint.style.opacity = '0.8'; }
                if (loadTimeout) clearTimeout(loadTimeout);
            });
            frame.addEventListener('error', () => { if (hint) hint.textContent = '⚡ جارٍ المحاولة...'; });
            loadTimeout = setTimeout(() => { if (!frameLoaded && hint) { hint.textContent = '🎯 اضغط للمتابعة'; hint.style.opacity = '0.7'; } }, 6000);

            // ---------- تحسينات الصورة والأبعاد ----------
            function adjustImage() {
                const img = document.querySelector('.splash-image');
                if (!img) return;
                const ratio = window.innerWidth / window.innerHeight;
                img.style.objectFit = (ratio >= 2.2) ? 'contain' : 'cover';
                img.style.background = (ratio >= 2.2) ? '#000' : 'transparent';
            }
            function setViewportHeight() { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); }
            window.addEventListener('resize', () => { adjustImage(); setViewportHeight(); });
            window.addEventListener('orientationchange', () => setTimeout(() => { adjustImage(); setViewportHeight(); }, 50));
            adjustImage(); setViewportHeight();

            window.addEventListener('beforeunload', () => { if (loadTimeout) clearTimeout(loadTimeout); stopAllAudio(); });

            console.log('🚀 التطبيق جاهز: الموسيقى من الرابط المحول dl=1 مع CORS مناسب.');
        })();
    </script>
</body>
</html>
