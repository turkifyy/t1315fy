<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>🎮 Fullscreen Splash + Sandbox iframe | Relic Runway</title>
    <!-- Bootstrap 5 RTL latest -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" integrity="sha384-dGQ1UDQ6wVg4YVrL8S2x+4xZt5h1J3s2bZ2k5g8Vl+5Y6hF5l5M5Y5B6Z5y5" crossorigin="anonymous">
    <!-- خط أنيق -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* إعادة تعيين كامل لضمان ملء الشاشة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Cairo', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            min-width: 100dvw;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* الحاوية الرئيسية */
        .game-master-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            background: #0b0e14;
            overflow: hidden;
        }

        /* غلاف الإطار */
        .iframe-full-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #0a0c12;
        }

        #gameFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #0f1219;
            pointer-events: none;  /* ستصبح auto بعد إخفاء splash */
        }

        .game-master-container.splash-hidden #gameFrame {
            pointer-events: auto;
        }

        /* شاشة الـ Splash بملء الشاشة - قابلة للنقر */
        .fullscreen-splash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            cursor: pointer;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.45s cubic-bezier(0.23, 1, 0.32, 1), visibility 0.45s;
            will-change: opacity;
            touch-action: pan-y;  /* نسمح بلمس ولكن نمنع التمرير الخلفي عبر JS */
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* الصورة تملأ المساحة مع إبقاء النقر يعمل */
        .splash-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            display: block;
            pointer-events: auto;  /* مهم: تسمح بمرور النقر */
            user-select: none;
            -webkit-user-drag: none;
        }

        /* إخفاء الشاشة */
        .fullscreen-splash.splash-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* مؤشر تحميل */
        .preload-hint {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            z-index: 5;
            pointer-events: none;
            backdrop-filter: blur(4px);
            width: fit-content;
            margin: 0 auto;
            padding: 6px 18px;
            border-radius: 40px;
            background: rgba(10, 15, 20, 0.3);
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: opacity 0.5s;
        }

        @media (min-width: 1920px) {
            .preload-hint {
                font-size: 1.4rem;
                padding: 12px 32px;
            }
        }
    </style>
</head>
<body>
    <div class="game-master-container" id="masterContainer">
        <!-- الإطار الخلفي -->
        <div class="iframe-full-wrapper">
            <iframe 
                id="gameFrame"
                title="Relic Runway Game - Sandboxed"
                src="https://gemioli.com/relicrunway/"
                sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups-to-escape-sandbox"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                loading="eager"
                importance="high"
            ></iframe>
            <div class="preload-hint" id="loadingHint">⏳ جاري تحميل المغامرة...</div>
        </div>

        <!-- شاشة البداية (بدون أي نصوص إضافية) -->
        <div class="fullscreen-splash" id="splashScreen">
            <img 
                src="https://turkify.netlify.app/20260407_221107.webp" 
                alt="Splash Screen"
                class="splash-image"
                loading="eager"
                fetchpriority="high"
                decoding="async"
                draggable="false"
            >
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <script>
        (function(){
            "use strict";

            const master = document.getElementById('masterContainer');
            const splash = document.getElementById('splashScreen');
            const frame = document.getElementById('gameFrame');
            const hint = document.getElementById('loadingHint');

            let splashHidden = false;

            // دالة إخفاء السبلاش وإظهار اللعبة
            function revealGame() {
                if (splashHidden) return;
                
                splash.classList.add('splash-hidden');
                master.classList.add('splash-hidden');
                
                if (hint) {
                    hint.style.opacity = '0';
                    setTimeout(() => { if(hint) hint.style.display = 'none'; }, 400);
                }
                
                splashHidden = true;
                console.log('✅ Splash مخفية، اللعبة ظاهرة.');
            }

            // مستمع للنقر على كامل الـ splash (سواء على الصورة أو الخلفية)
            splash.addEventListener('click', function(e) {
                e.stopPropagation(); // لا حاجة لانتشار
                revealGame();
            });

            // للتعامل مع اللمس (مع منع التمرير الخلفي فقط أثناء اللمس)
            splash.addEventListener('touchstart', function(e) {
                // نمنع التمرير الافتراضي مؤقتاً فقط
                e.preventDefault();
            }, { passive: false });

            // منع السحب أو القائمة المنبثقة
            splash.addEventListener('contextmenu', (e) => e.preventDefault());
            splash.addEventListener('dragstart', (e) => e.preventDefault());

            // عند تحميل الإطار
            frame.addEventListener('load', () => {
                console.log('🎮 iframe محمل وجاهز.');
                if (hint) {
                    hint.textContent = '✨ جاهز! اضغط للبدء';
                    hint.style.opacity = '0.8';
                }
            });

            frame.addEventListener('error', () => {
                if (hint) {
                    hint.textContent = '⚡ تم التحميل مع بعض القيود';
                }
            });

            // دعم iOS وارتفاع ديناميكي
            function setViewportHeight() {
                const vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);
            }
            setViewportHeight();
            window.addEventListener('resize', setViewportHeight);
            window.addEventListener('orientationchange', setViewportHeight);

            // اختفاء تدريجي للمؤشر بعد فترة
            setTimeout(() => {
                if (hint && !splashHidden) {
                    hint.textContent = '🎯 اضغط للمتابعة';
                    hint.style.opacity = '0.6';
                }
            }, 2500);

            // ضمان عمل النقر على الصورة حتى لو كان هناك عناصر فوقية (لا يوجد)
            // تم إصلاح المشكلة الرئيسية: pointer-events: auto على الصورة وعدم منع الأحداث بشكل خاطئ.
        })();
    </script>
</body>
</html>
