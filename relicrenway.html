<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>🎮 Splash + موسيقى ذكية | Relic Runway</title>
    <!-- Bootstrap 5 RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Cairo', sans-serif; }
        body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; min-width: 100dvw; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
        .game-master-container { position: relative; width: 100%; height: 100%; max-width: 100vw; max-height: 100vh; background: #0b0e14; overflow: hidden; }
        .iframe-full-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #0a0c12; pointer-events: none; }
        .game-master-container.splash-hidden .iframe-full-wrapper { pointer-events: auto; }
        #gameFrame { width: 100%; height: 100%; border: none; display: block; background: #0f1219; }
        
        /* شاشة البداية مع تأثير اختفاء احترافي */
        .fullscreen-splash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            cursor: pointer;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
            will-change: opacity;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .splash-image { width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block; pointer-events: none; user-select: none; -webkit-user-drag: none; }
        @media (min-aspect-ratio: 21/9) { .splash-image { object-fit: contain; background: #000; } }
        .fullscreen-splash.splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* أيقونة الصوت (Subway Surfers style) - أعلى اليسار */
        .sound-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1002;
            width: 48px;
            height: 48px;
            background: rgba(20, 25, 35, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1.5px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.25s ease;
            color: white;
            font-size: 24px;
        }
        .sound-icon:hover { background: rgba(40, 45, 60, 0.85); border-color: gold; transform: scale(1.05); }
        .sound-icon:active { transform: scale(0.95); }
        .sound-icon.hidden { opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.3s, visibility 0.3s; }
        
        /* تأثير نبضي خفيف للإشارة */
        .sound-icon::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, 0.4);
            animation: pulseRing 2s infinite;
            pointer-events: none;
        }
        @keyframes pulseRing {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.4); }
        }

        .preload-hint {
            position: absolute; bottom: 100px; left: 0; right: 0; text-align: center;
            color: rgba(255,255,255,0.5); font-size: 0.9rem; z-index: 5; pointer-events: none;
            backdrop-filter: blur(4px); width: fit-content; margin: 0 auto; padding: 6px 18px;
            border-radius: 40px; background: rgba(10,15,20,0.2); border: 1px solid rgba(255,215,0,0.15);
            transition: opacity 0.5s;
        }
        @media (min-width: 1920px) { .preload-hint { font-size: 1.4rem; padding: 12px 32px; } }
        
        /* تعديل للشاشات الصغيرة */
        @media (max-width: 480px) {
            .sound-icon { width: 42px; height: 42px; font-size: 22px; top: 16px; left: 16px; }
        }
    </style>
</head>
<body>
    <div class="game-master-container" id="masterContainer">
        <div class="iframe-full-wrapper">
            <iframe id="gameFrame" title="Relic Runway Game" src="https://gemioli.com/relicrunway/" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" loading="eager" importance="high"></iframe>
            <div class="preload-hint" id="loadingHint">⏳ جاري تحميل المغامرة...</div>
        </div>
        <div class="fullscreen-splash" id="splashScreen">
            <img src="https://turkify.netlify.app/20260407_221107.webp" alt="Splash Screen" class="splash-image" loading="eager" fetchpriority="high" decoding="async" draggable="false">
            
            <!-- أيقونة الصوت فقط (بدون نص) مثل Subway Surfers -->
            <div class="sound-icon" id="soundIcon">🎵</div>
        </div>
    </div>

    <!-- زر وهمي للمحاكاة البشرية التلقائية -->
    <button id="dummyUnmuteBtn" style="position: fixed; opacity: 0; pointer-events: none; width: 1px; height: 1px;"></button>

    <script>
        (function(){
            "use strict";

            // ---------- رابط GitHub Raw المباشر ----------
            const AUDIO_URL = 'https://raw.githubusercontent.com/turkifyy/t1315fy/refs/heads/main/lucy_s_hunt.mp3';
            
            const master = document.getElementById('masterContainer');
            const splash = document.getElementById('splashScreen');
            const frame = document.getElementById('gameFrame');
            const hint = document.getElementById('loadingHint');
            const soundIcon = document.getElementById('soundIcon');
            const dummyBtn = document.getElementById('dummyUnmuteBtn');

            // نظام الصوت
            let audioContext = null;
            let sourceNode = null;
            let gainNode = null;
            let audioBuffer = null;
            let isMusicPlaying = false;
            let isAudible = false;
            let autoSimulationDone = false;
            let fadeOutTimer = null;
            let stopTimer = null;

            // ---------- تهيئة وتشغيل الصوت بصمت ----------
            async function initSilentAudio() {
                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    audioContext = new AudioContextClass();
                    
                    const response = await fetch(AUDIO_URL);
                    const arrayBuffer = await response.arrayBuffer();
                    audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    
                    gainNode = audioContext.createGain();
                    gainNode.gain.value = 0; // صامت
                    
                    sourceNode = audioContext.createBufferSource();
                    sourceNode.buffer = audioBuffer;
                    sourceNode.loop = true;
                    sourceNode.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    sourceNode.start(0);
                    isMusicPlaying = true;
                    
                    console.log('✅ تشغيل صامت ناجح (Web Audio).');
                    return true;
                } catch (error) {
                    console.warn('❌ فشل Web Audio الصامت:', error.message);
                    return false;
                }
            }

            // ---------- طريقة احتياطية: Audio element مع muted ----------
            function fallbackSilentAudio() {
                return new Promise((resolve) => {
                    const audio = new Audio(AUDIO_URL);
                    audio.crossOrigin = 'anonymous';
                    audio.loop = true;
                    audio.muted = true;
                    audio.volume = 0.5;
                    
                    audio.play().then(() => {
                        isMusicPlaying = true;
                        window._fallbackAudio = audio;
                        console.log('✅ تشغيل صامت عبر Audio element.');
                        resolve(true);
                    }).catch(e => {
                        console.warn('فشل Audio element الصامت:', e);
                        resolve(false);
                    });
                });
            }

            // ---------- رفع الصوت ليصبح مسموعاً ----------
            function makeAudioAudible() {
                if (!isMusicPlaying) return false;
                if (isAudible) return true;
                
                if (gainNode) {
                    gainNode.gain.linearRampToValueAtTime(0.5, audioContext.currentTime + 0.1);
                    isAudible = true;
                    console.log('🔊 أصبح الصوت مسموعاً (Web Audio).');
                } else if (window._fallbackAudio) {
                    window._fallbackAudio.muted = false;
                    isAudible = true;
                    console.log('🔊 أصبح الصوت مسموعاً (Audio element).');
                }
                return true;
            }

            // ---------- تشغيل مسموع يدوي (عند النقر على الأيقونة) ----------
            async function manualAudibleStart() {
                if (isAudible) {
                    soundIcon.classList.add('hidden');
                    return;
                }
                
                if (isMusicPlaying) {
                    makeAudioAudible();
                    soundIcon.classList.add('hidden');
                    return;
                }
                
                // تشغيل من الصفر بصوت مسموع
                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    audioContext = new AudioContextClass();
                    const response = await fetch(AUDIO_URL);
                    const arrayBuffer = await response.arrayBuffer();
                    audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    
                    gainNode = audioContext.createGain();
                    gainNode.gain.value = 0.5;
                    
                    sourceNode = audioContext.createBufferSource();
                    sourceNode.buffer = audioBuffer;
                    sourceNode.loop = true;
                    sourceNode.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    sourceNode.start(0);
                    
                    isMusicPlaying = true;
                    isAudible = true;
                    console.log('🎵 بدأ التشغيل المسموع يدوياً.');
                    soundIcon.classList.add('hidden');
                } catch (e) {
                    const audio = new Audio(AUDIO_URL);
                    audio.crossOrigin = 'anonymous';
                    audio.loop = true;
                    audio.volume = 0.5;
                    await audio.play();
                    window._fallbackAudio = audio;
                    isMusicPlaying = true;
                    isAudible = true;
                    console.log('🎵 Audio element بدأ مسموعاً يدوياً.');
                    soundIcon.classList.add('hidden');
                }
            }

            // ---------- محاكاة نقرة بشرية على الزر الوهمي ----------
            function simulateHumanClick() {
                if (autoSimulationDone) return;
                autoSimulationDone = true;

                const clickEvent = new MouseEvent('click', {
                    view: window,
                    bubbles: true,
                    cancelable: true
                });
                dummyBtn.dispatchEvent(clickEvent);
                console.log('🖱️ تم إرسال محاكاة نقرة بشرية.');
            }

            dummyBtn.addEventListener('click', function() {
                if (makeAudioAudible()) {
                    soundIcon.classList.add('hidden');
                    console.log('✅ تم رفع الصوت تلقائياً عبر المحاكاة.');
                }
            });

            // ---------- إيقاف الموسيقى مع تلاشي تدريجي (Fade Out) ----------
            function fadeOutAndStopMusic() {
                if (!isMusicPlaying) return;
                
                const fadeDuration = 1.5; // ثواني
                
                if (gainNode) {
                    gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + fadeDuration);
                    setTimeout(() => {
                        stopMusicImmediately();
                    }, fadeDuration * 1000);
                } else if (window._fallbackAudio) {
                    // تلاشي يدوي للـ Audio element
                    const audio = window._fallbackAudio;
                    const step = 0.05;
                    const interval = 50;
                    const steps = fadeDuration * 1000 / interval;
                    let currentStep = 0;
                    
                    const fadeInterval = setInterval(() => {
                        if (audio.volume > step) {
                            audio.volume = Math.max(0, audio.volume - step);
                        } else {
                            audio.volume = 0;
                            clearInterval(fadeInterval);
                            stopMusicImmediately();
                        }
                        currentStep++;
                        if (currentStep >= steps) {
                            clearInterval(fadeInterval);
                            stopMusicImmediately();
                        }
                    }, interval);
                }
            }

            function stopMusicImmediately() {
                if (sourceNode) {
                    try { sourceNode.stop(); } catch(e) {}
                    sourceNode = null;
                }
                if (audioContext) {
                    audioContext.close();
                    audioContext = null;
                }
                if (window._fallbackAudio) {
                    window._fallbackAudio.pause();
                    window._fallbackAudio = null;
                }
                isMusicPlaying = false;
                isAudible = false;
                console.log('⏹️ الموسيقى توقفت تماماً.');
            }

            // ---------- إخفاء السبلاش (مع تأخير إيقاف الموسيقى 10 ثوان) ----------
            let splashHidden = false;
            function hideSplash() {
                if (splashHidden) return;
                
                // إخفاء السبلاش بتأثير ناعم
                splash.classList.add('splash-hidden');
                master.classList.add('splash-hidden');
                
                if (hint) {
                    hint.style.opacity = '0';
                    setTimeout(() => { if(hint) hint.style.display = 'none'; }, 400);
                }
                
                splashHidden = true;
                console.log('🖼️ السبلاش اختفت.');
                
                // جدولة إيقاف الموسيقى بعد 10 ثوانٍ
                if (stopTimer) clearTimeout(stopTimer);
                stopTimer = setTimeout(() => {
                    fadeOutAndStopMusic();
                    stopTimer = null;
                }, 10000); // 10 ثوانٍ
            }

            // ---------- ربط الأحداث ----------
            soundIcon.addEventListener('click', (e) => {
                e.stopPropagation();
                manualAudibleStart();
            });

            splash.addEventListener('click', (e) => {
                // إذا نقر المستخدم على أيقونة الصوت، لا نخفي السبلاش
                if (e.target === soundIcon || soundIcon.contains(e.target)) return;
                hideSplash();
            });
            
            splash.addEventListener('touchend', (e) => {
                if (e.target === soundIcon || soundIcon.contains(e.target)) return;
                e.preventDefault();
                hideSplash();
            }, { passive: false });
            
            splash.addEventListener('contextmenu', (e) => e.preventDefault());
            splash.addEventListener('dragstart', (e) => e.preventDefault());

            // ---------- بدء التشغيل التلقائي مع المحاكاة ----------
            async function startAutoPlayWithSimulation() {
                const webSuccess = await initSilentAudio();
                if (!webSuccess) {
                    await fallbackSilentAudio();
                }

                if (isMusicPlaying) {
                    setTimeout(() => {
                        simulateHumanClick();
                    }, 200);

                    setTimeout(() => {
                        if (!isAudible) {
                            soundIcon.classList.remove('hidden');
                            console.log('⚠️ المحاكاة لم تنجح، الأيقونة ظاهرة.');
                        }
                    }, 1500);
                } else {
                    soundIcon.classList.remove('hidden');
                    console.log('⚠️ التشغيل التلقائي فشل، الأيقونة ظاهرة.');
                }
            }

            // تشغيل فوري
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', startAutoPlayWithSimulation);
            } else {
                startAutoPlayWithSimulation();
            }

            // ---------- تحميل iframe ----------
            let frameLoaded = false, loadTimeout = null;
            frame.addEventListener('load', () => {
                frameLoaded = true;
                if (hint) { hint.textContent = '✨ جاهز! اضغط للبدء'; hint.style.opacity = '0.8'; }
                if (loadTimeout) clearTimeout(loadTimeout);
            });
            frame.addEventListener('error', () => { if (hint) hint.textContent = '⚡ جارٍ المحاولة...'; });
            loadTimeout = setTimeout(() => { if (!frameLoaded && hint) { hint.textContent = '🎯 اضغط للمتابعة'; hint.style.opacity = '0.7'; } }, 6000);

            // ---------- تحسينات الصورة والأبعاد ----------
            function adjustImage() {
                const img = document.querySelector('.splash-image');
                if (!img) return;
                const ratio = window.innerWidth / window.innerHeight;
                img.style.objectFit = (ratio >= 2.2) ? 'contain' : 'cover';
                img.style.background = (ratio >= 2.2) ? '#000' : 'transparent';
            }
            function setViewportHeight() { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); }
            window.addEventListener('resize', () => { adjustImage(); setViewportHeight(); });
            window.addEventListener('orientationchange', () => setTimeout(() => { adjustImage(); setViewportHeight(); }, 50));
            adjustImage(); setViewportHeight();

            window.addEventListener('beforeunload', () => {
                if (loadTimeout) clearTimeout(loadTimeout);
                if (stopTimer) clearTimeout(stopTimer);
                stopMusicImmediately();
            });

            console.log('🚀 التطبيق جاهز: أيقونة Subway Surfers أعلى اليسار، الموسيقى تتلاشى بعد 10 ثوانٍ من اختفاء السبلاش.');
        })();
    </script>
</body>
</html>
