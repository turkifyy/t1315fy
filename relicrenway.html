<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>🎮 Splash + موسيقى تلقائية | Relic Runway</title>
    <!-- Bootstrap 5 RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Cairo', sans-serif; }
        body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; min-width: 100dvw; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
        .game-master-container { position: relative; width: 100%; height: 100%; max-width: 100vw; max-height: 100vh; background: #0b0e14; overflow: hidden; }
        .iframe-full-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #0a0c12; pointer-events: none; }
        .game-master-container.splash-hidden .iframe-full-wrapper { pointer-events: auto; }
        #gameFrame { width: 100%; height: 100%; border: none; display: block; background: #0f1219; }
        .fullscreen-splash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; cursor: pointer; background: #000; display: flex; align-items: center; justify-content: center; transition: opacity 0.45s, visibility 0.45s; will-change: opacity; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
        .splash-image { width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block; pointer-events: none; user-select: none; -webkit-user-drag: none; }
        @media (min-aspect-ratio: 21/9) { .splash-image { object-fit: contain; background: #000; } }
        .fullscreen-splash.splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .preload-hint { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.5); font-size: 0.9rem; z-index: 5; pointer-events: none; backdrop-filter: blur(4px); width: fit-content; margin: 0 auto; padding: 6px 18px; border-radius: 40px; background: rgba(10,15,20,0.2); border: 1px solid rgba(255,215,0,0.15); transition: opacity 0.5s; }
        @media (min-width: 1920px) { .preload-hint { font-size: 1.4rem; padding: 12px 32px; } }
    </style>
</head>
<body>
    <div class="game-master-container" id="masterContainer">
        <div class="iframe-full-wrapper">
            <iframe id="gameFrame" title="Relic Runway Game" src="https://gemioli.com/relicrunway/" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" loading="eager" importance="high"></iframe>
            <div class="preload-hint" id="loadingHint">⏳ جاري تحميل المغامرة...</div>
        </div>
        <div class="fullscreen-splash" id="splashScreen">
            <img src="https://turkify.netlify.app/20260407_221107.webp" alt="Splash Screen" class="splash-image" loading="eager" fetchpriority="high" decoding="async" draggable="false">
        </div>
    </div>

    <script>
        (function(){
            "use strict";

            // ---------- الرابط المحول بشكل صحيح (dl=1) ----------
            const AUDIO_URL = 'https://www.dropbox.com/scl/fi/df0c05o2z5bxt2ofetk5a/lucy_s_hunt.mp3?rlkey=gt7jw8086tpqdn03mz8l1mms7&dl=1';
            
            const master = document.getElementById('masterContainer');
            const splash = document.getElementById('splashScreen');
            const frame = document.getElementById('gameFrame');
            const hint = document.getElementById('loadingHint');

            // متغيرات الصوت
            let audioContext = null;
            let sourceNode = null;
            let fallbackAudio = null;
            let musicActive = false;

            // ---------- 1. محاولة تشغيل عبر Web Audio API (مع CORS) ----------
            async function playViaWebAudio() {
                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    audioContext = new AudioContextClass();

                    // طلب مع crossorigin لتفادي قيود CORS
                    const response = await fetch(AUDIO_URL, { mode: 'cors', credentials: 'omit' });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                    const startPlayback = () => {
                        if (musicActive) return;
                        sourceNode = audioContext.createBufferSource();
                        sourceNode.buffer = audioBuffer;
                        sourceNode.loop = true;
                        sourceNode.connect(audioContext.destination);
                        sourceNode.start(0);
                        musicActive = true;
                        console.log('🎵 Web Audio يعمل بالرابط المباشر.');
                    };

                    if (audioContext.state === 'suspended') {
                        await audioContext.resume();
                        if (audioContext.state === 'running') {
                            startPlayback();
                        } else {
                            // ننتظر أول تفاعل
                            const resumeHandler = async () => {
                                await audioContext.resume();
                                startPlayback();
                                document.removeEventListener('touchstart', resumeHandler);
                                document.removeEventListener('click', resumeHandler);
                            };
                            document.addEventListener('touchstart', resumeHandler, { once: true });
                            document.addEventListener('click', resumeHandler, { once: true });
                        }
                    } else {
                        startPlayback();
                    }
                    return true;
                } catch (e) {
                    console.warn('Web Audio فشل:', e.message);
                    return false;
                }
            }

            // ---------- 2. طبقة احتياطية: عنصر Audio مع crossorigin ----------
            function playViaAudioElement() {
                return new Promise((resolve) => {
                    const audio = new Audio();
                    audio.crossOrigin = 'anonymous';  // مهم لـ CORS
                    audio.src = AUDIO_URL;
                    audio.loop = true;
                    audio.volume = 0.45;

                    audio.play().then(() => {
                        musicActive = true;
                        fallbackAudio = audio;
                        console.log('🎵 Audio element يعمل.');
                        resolve(true);
                    }).catch(() => {
                        // إذا فشل التشغيل المباشر، نجعله مكتومًا ثم ننتظر اللمس
                        audio.muted = true;
                        audio.play().then(() => {
                            musicActive = true;
                            fallbackAudio = audio;
                            console.log('🔇 الموسيقى مكتومة، بانتظار اللمس.');
                            const unmute = () => {
                                if (fallbackAudio) fallbackAudio.muted = false;
                                document.removeEventListener('touchstart', unmute);
                                document.removeEventListener('click', unmute);
                            };
                            document.addEventListener('touchstart', unmute, { once: true });
                            document.addEventListener('click', unmute, { once: true });
                            resolve(true);
                        }).catch(err => {
                            console.error('فشل Audio element:', err);
                            resolve(false);
                        });
                    });
                });
            }

            // ---------- بدء الموسيقى تلقائياً عند تحميل الصفحة ----------
            async function startMusic() {
                if (musicActive) return;
                
                // نحاول Web Audio أولاً
                const webAudioSuccess = await playViaWebAudio();
                if (!webAudioSuccess) {
                    // إذا فشل، نستخدم Audio element
                    await playViaAudioElement();
                }
            }

            // ---------- إيقاف الموسيقى ----------
            function stopMusic() {
                if (sourceNode) {
                    try { sourceNode.stop(); } catch(e) {}
                    sourceNode = null;
                }
                if (audioContext) {
                    audioContext.close();
                    audioContext = null;
                }
                if (fallbackAudio) {
                    fallbackAudio.pause();
                    fallbackAudio = null;
                }
                musicActive = false;
                console.log('⏹️ الموسيقى توقفت.');
            }

            // ---------- إخفاء Splash وإيقاف الموسيقى ----------
            let splashHidden = false;
            function hideSplash() {
                if (splashHidden) return;
                stopMusic();
                splash.classList.add('splash-hidden');
                master.classList.add('splash-hidden');
                if (hint) {
                    hint.style.opacity = '0';
                    setTimeout(() => { if(hint) hint.style.display = 'none'; }, 400);
                }
                splashHidden = true;
            }

            // ---------- مستمعات الأحداث ----------
            splash.addEventListener('click', hideSplash);
            splash.addEventListener('touchend', (e) => {
                e.preventDefault();
                hideSplash();
            }, { passive: false });
            splash.addEventListener('contextmenu', (e) => e.preventDefault());
            splash.addEventListener('dragstart', (e) => e.preventDefault());

            // ---------- بدء الموسيقى فوراً (حتى قبل DOMContentLoaded) ----------
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', startMusic);
            } else {
                startMusic();
            }
            setTimeout(startMusic, 30);  // محاولة مبكرة

            // ---------- تحميل iframe ----------
            let frameLoaded = false;
            let loadTimeout = null;
            frame.addEventListener('load', () => {
                frameLoaded = true;
                if (hint) {
                    hint.textContent = '✨ جاهز! اضغط للبدء';
                    hint.style.opacity = '0.8';
                }
                if (loadTimeout) clearTimeout(loadTimeout);
            });
            frame.addEventListener('error', () => {
                if (hint) hint.textContent = '⚡ جارٍ المحاولة...';
            });
            loadTimeout = setTimeout(() => {
                if (!frameLoaded && hint) {
                    hint.textContent = '🎯 اضغط للمتابعة';
                    hint.style.opacity = '0.7';
                }
            }, 6000);

            // ---------- تحسينات الصورة والأبعاد ----------
            function adjustImage() {
                const img = document.querySelector('.splash-image');
                if (!img) return;
                const ratio = window.innerWidth / window.innerHeight;
                img.style.objectFit = (ratio >= 2.2) ? 'contain' : 'cover';
                img.style.background = (ratio >= 2.2) ? '#000' : 'transparent';
            }
            function setViewportHeight() {
                const vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);
            }
            window.addEventListener('resize', () => { adjustImage(); setViewportHeight(); });
            window.addEventListener('orientationchange', () => setTimeout(() => { adjustImage(); setViewportHeight(); }, 50));
            adjustImage();
            setViewportHeight();

            window.addEventListener('beforeunload', () => {
                if (loadTimeout) clearTimeout(loadTimeout);
                stopMusic();
            });

            console.log('🚀 التطبيق جاهز: الرابط المحول dl=1 مستخدم، مع CORS مناسب.');
        })();
    </script>
</body>
</html>
