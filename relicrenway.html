<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>🎮 Fullscreen Splash + Sandbox iframe | Relic Runway</title>
    <!-- Bootstrap 5 RTL latest -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" integrity="sha384-dGQ1UDQ6wVg4YVrL8S2x+4xZt5h1J3s2bZ2k5g8Vl+5Y6hF5l5M5Y5B6Z5y5" crossorigin="anonymous">
    <!-- خط أنيق -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* إعادة تعيين كامل لضمان ملء الشاشة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* منع التمرير نهائياً */
            background: #000;
            font-family: 'Cairo', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            /* استخدام وحدات ديناميكية حديثة للملء الكامل مع مراعاة أشرطة المتصفح */
            min-height: 100dvh;
            min-width: 100dvw;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* الحاوية الرئيسية: تأخذ كامل المساحة وتكون مرنة */
        .game-master-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            background: #0b0e14;
            overflow: hidden;
            /* سنضبط نسبة العرض إلى الارتفاع ديناميكياً عبر JS لتحسين تجربة iframe */
        }

        /* غلاف الإطار: يكون دائماً في الخلفية ويملأ الحاوية */
        .iframe-full-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #0a0c12;
        }

        #gameFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #0f1219;
            /* حماية من التفاعل المبكر */
            pointer-events: none;
        }

        /* عندما تكون شاشة البداية مخفية نعيد التفاعل */
        .game-master-container.splash-hidden #gameFrame {
            pointer-events: auto;
        }

        /* شاشة الـ Splash بملء الشاشة الكامل */
        .fullscreen-splash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            cursor: pointer;
            background: #000; /* لون احتياطي */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.45s cubic-bezier(0.23, 1, 0.32, 1), visibility 0.45s;
            will-change: opacity;
            /* منع أي أحداث غير مرغوبة */
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* الصورة تملأ كامل المساحة مع الحفاظ على النسبة دون تشويه */
        .splash-image {
            width: 100%;
            height: 100%;
            object-fit: cover;      /* يغطي كل المساحة، قد يقطع أطراف الصورة لكن لا تشوه */
            object-position: center center;
            display: block;
            pointer-events: none;    /* النقر يمر إلى الـ div خلفها */
            user-select: none;
            -webkit-user-drag: none;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        /* نمط احتياطي للشاشات العريضة جداً إذا أردنا احتواء الصورة بالكامل (غير مطلوب لكنه خيار ذكي) */
        @media (orientation: landscape) and (min-aspect-ratio: 16/9) {
            /* في الشاشات العريضة جداً قد تكون الصورة عمودية، نضمن أنها تغطي كامل العرض دون فراغات */
            .splash-image {
                object-fit: cover;
            }
        }

        /* للشاشات فائقة الطول (مثل 9:21) نضمن تغطية كاملة */
        @media (orientation: portrait) and (max-aspect-ratio: 9/16) {
            .splash-image {
                object-fit: cover;
            }
        }

        /* إخفاء الشاشة بسلاسة */
        .fullscreen-splash.splash-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* مؤشر تحميل بسيط وشفاف (يظهر خلف splash إن تأخر التحميل) */
        .preload-hint {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            z-index: 5;
            pointer-events: none;
            backdrop-filter: blur(4px);
            width: fit-content;
            margin: 0 auto;
            padding: 6px 18px;
            border-radius: 40px;
            background: rgba(10, 15, 20, 0.3);
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: opacity 0.5s;
        }

        /* تحسينات للشاشات الكبيرة (تلفزيونات ذكية) */
        @media (min-width: 1920px) {
            .preload-hint {
                font-size: 1.4rem;
                padding: 12px 32px;
            }
        }

        /* ضمان أن iframe يستخدم sandbox الصحيح مع popups */
        /* لا يوجد أي نص "اضغط للمتابعة" كما طلبت */
    </style>
</head>
<body>
    <div class="game-master-container" id="masterContainer">
        <!-- قسم الإطار (اللعبة تُحمّل مسبقاً) -->
        <div class="iframe-full-wrapper">
            <iframe 
                id="gameFrame"
                title="Relic Runway Game - Sandboxed"
                src="https://gemioli.com/relicrunway/"
                sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups-to-escape-sandbox"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                loading="eager"
                importance="high"
            ></iframe>
            <!-- مؤشر بسيط جداً يظهر فقط إذا تأخر التحميل، وسيختفي -->
            <div class="preload-hint" id="loadingHint">⏳ جاري تحميل المغامرة...</div>
        </div>

        <!-- شاشة البداية بملء الشاشة بدون أي نصوص إضافية -->
        <div class="fullscreen-splash" id="splashScreen">
            <img 
                src="https://turkify.netlify.app/20260407_221107.webp" 
                alt="Splash Screen"
                class="splash-image"
                loading="eager"
                fetchpriority="high"
                decoding="async"
                draggable="false"
            >
        </div>
    </div>

    <!-- Bootstrap JS (اختياري للتوافق) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <script>
        (function(){
            "use strict";

            // ---------- العناصر ----------
            const master = document.getElementById('masterContainer');
            const splash = document.getElementById('splashScreen');
            const frame = document.getElementById('gameFrame');
            const hint = document.getElementById('loadingHint');

            let splashHidden = false;

            // ---------- دالة إخفاء الشاشة وعرض اللعبة ----------
            function revealGame() {
                if (splashHidden) return;
                
                // إضافة كلاس الإخفاء
                splash.classList.add('splash-hidden');
                master.classList.add('splash-hidden');
                
                // إخفاء المؤشر نهائياً
                if (hint) {
                    hint.style.opacity = '0';
                    hint.style.transition = 'opacity 0.4s';
                    setTimeout(() => { hint.style.display = 'none'; }, 500);
                }
                
                splashHidden = true;
                
                // محاولة تفعيل الصوت/الفيديو بعد التفاعل (ضروري لبعض الألعاب)
                try {
                    // بعض الألعاب تحتاج لتفاعل المستخدم لتشغيل الصوت
                    // النقر على splash يوفر ذلك
                } catch (e) {}
            }

            // ---------- التعامل مع النقر/اللمس على الشاشة الكاملة ----------
            splash.addEventListener('click', revealGame);
            splash.addEventListener('touchstart', (e) => {
                // نمنع السلوك الافتراضي لمنع التمرير
                e.preventDefault();
            }, { passive: false });
            
            // منع السحب أو القائمة السياقية
            splash.addEventListener('contextmenu', (e) => e.preventDefault());
            splash.addEventListener('dragstart', (e) => e.preventDefault());

            // ---------- ذكاء إضافي: ضبط iframe بناءً على نسبة العرض للارتفاع (لتحسين تجربة اللعبة) ----------
            function adjustIframeAspect() {
                // هذه الوظيفة تضبط فقط بعض الخصائص البصرية إذا لزم الأمر
                // لكن iframe يملأ الحاوية بالكامل افتراضياً
                const container = document.querySelector('.game-master-container');
                if (!container) return;
                
                // يمكن إضافة تحسينات لتوسيط المحتوى داخل iframe لكن عادة الألعاب تتكيف.
                // نترك الأمر كما هو.
            }

            window.addEventListener('resize', () => {
                adjustIframeAspect();
            });

            // عند تحميل الإطار بالكامل
            frame.addEventListener('load', () => {
                console.log('✅ iframe sandbox تم تحميله مع السماح بالنوافذ المنبثقة.');
                if (hint) {
                    hint.textContent = '✨ جاهز! اضغط على الشاشة للبدء';
                    hint.style.opacity = '0.7';
                }
                adjustIframeAspect();
            });

            // في حال وجود خطأ (اختياري)
            frame.addEventListener('error', () => {
                if (hint) {
                    hint.textContent = '⚡ تم التحميل (قد تكون هناك قيود)';
                }
            });

            // ---------- خوارزمية ذكية لضمان ملء الصورة للشاشة مع أي نسبة ----------
            // الصورة تستخدم object-fit: cover وهذا يكفي، لكن نضبط ديناميكياً إذا لزم
            function smartImageFill() {
                const img = document.querySelector('.splash-image');
                if (!img) return;
                
                const containerRatio = window.innerWidth / window.innerHeight;
                // الصورة عمودية غالباً، لكن نضمن عدم ظهور فراغات
                // نضبط object-fit حسب الحاجة (cover هو الأفضل للتغطية الكاملة)
                // في حال أردت احتواء الصورة بالكامل بدون قص (contain) استخدم التعليق أدناه
                // لكن طلبك "تملأ الشاشة كاملة" = cover
                img.style.objectFit = 'cover';
                
                // تحسين للشاشات فائقة الاتساع: قد نفضل contain مع خلفية سوداء لكن هذا ليس المطلوب
                // المطلوب: تغطية كاملة. لذلك نترك cover.
            }

            // استدعاء أولي
            smartImageFill();
            window.addEventListener('resize', smartImageFill);
            window.addEventListener('orientationchange', () => {
                setTimeout(smartImageFill, 20);
            });

            // ---------- معالجة مشاكل iOS / Safari مع 100dvh ----------
            function fixIOSViewport() {
                // نضمن أن body يستخدم ارتفاع النافذة الفعلي
                const vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);
            }
            fixIOSViewport();
            window.addEventListener('resize', fixIOSViewport);
            window.addEventListener('orientationchange', fixIOSViewport);

            // إخفاء مؤشر التحميل بعد 3 ثواني إذا لم ينقر المستخدم
            setTimeout(() => {
                if (hint && !splashHidden) {
                    hint.style.opacity = '0.4';
                    hint.textContent = '🎮 اضغط للبدء';
                }
            }, 2800);

            // ضمان أن sandbox يسمح بـ popups (تم إضافة allow-popups-to-escape-sandbox لمزيد من التوافق)
            console.log('🚀 Fullscreen Splash Screen جاهز | يعمل على جميع الأجهزة (هواتف، تابلت، تلفزيونات ذكية)');
        })();
    </script>
</body>
</html>
